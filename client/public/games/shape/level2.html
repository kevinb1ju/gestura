<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Shape Adventure - Level 2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2">

    <!-- MediaPipe dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>

<body>

    <div class="bg-decoration cloud-1">☁️</div>
    <div class="bg-decoration cloud-2">☁️</div>
    <div class="bg-decoration star-1">⭐</div>
    <div class="bg-decoration star-2">✨</div>

    <div class="container">
        <h1>✨ Shape Rain ✨</h1>

        <!-- Level 2 Game Phase -->
        <div id="level2-phase" class="phase active">
            <div class="header-stats">
                <div class="score" id="level2-score">⭐ Score: 0</div>
            </div>

            <div class="instruction-banner">
                <div class="instruction">Catch the shapes! ☔</div>
            </div>

            <div class="game-layout">
                <div class="camera-side" id="level2-camera-side">
                    <div class="camera-container small-mirror">
                        <video id="game-camera-video" autoplay playsinline
                            style="transform: scaleX(-1); width: 100%; height: 100%; object-fit: cover;"></video>
                        <canvas id="game-camera-canvas"
                            style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;"></canvas>
                    </div>
                    <div class="camera-status" id="camera-status">Point your finger! 👆</div>
                </div>

                <div class="shapes-side"
                    style="position: relative; height: 400px; border: var(--border); border-radius: 15px; background: rgba(255,255,255,0.5); overflow: hidden;"
                    id="level2-area">
                    <div id="level2-message"
                        style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 2rem; opacity: 0.5;">
                        Get Ready...
                    </div>
                </div>
            </div>

            <div class="footer-controls">
                <button class="nav-button secondary small-btn" onclick="window.location.href='index.html'">
                    ⬅️ Back to Level 1
                </button>
            </div>
        </div>

        <div class="finger-pointer" id="game-finger-pointer"></div>

        <!-- Victory Phase -->
        <div id="victory-phase" class="phase">
            <div class="victory-card">
                <h1>🏆 YOU WON! 🏆</h1>
                <div class="victory-emoji">🌟🎉🎈</div>
                <div class="victory-text">
                    Amazing job! You are a true Shape Master!
                    <br>
                    Score: <span id="final-score">100</span>
                </div>
                <button class="nav-button" onclick="window.location.href='index.html'">
                    🔄 Play Again
                </button>
            </div>
        </div>
    </div>

    <audio id="bg-music" loop>
        <source src="bg.mp3" type="audio/mpeg">
    </audio>

    <script src="level2.js"></script>
</body>

</html>
